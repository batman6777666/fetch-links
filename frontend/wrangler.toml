# Cloudflare Pages - wrangler.toml configuration
# This file configures your Cloudflare Pages deployment

name = "fetch-links-frontend"
compatibility_date = "2024-01-01"

# Pages configuration
[pages]
# Build settings
build_command = ""  # No build needed for static files
# Directory containing static files (relative to wrangler.toml)
# For Cloudflare Pages, static files go in the root or a specific folder

# Optional: Preview branch settings
[env.production]
name = "fetch-links-frontend"

[env.production.pages]
build_command = ""

# Optional: Add custom domains
# [[env.production.pages.custom_domains]]
# hostname = "www.yourdomain.com"

# Optional: Add secrets via wrangler secret put
# wrangler secret put API_KEY
